<div class="authentication container-fluid w-100 h-100 d-flex justify-content-center align-items-center">
  <div class="auth-container">
    <main class="form-signin p-4 shadow-lg">
      <form #form="ngForm" (ngSubmit)="onFormSubmit()">
        <h1 class="h3 mb-3 fw-bold ff-inter">{{ isLogin ? 'Please sign in' : 'Register' }}</h1>

        <div *ngIf="!isLogin" class="form-floating mb-2">
          <input [(ngModel)]="authDetails.fullName" class="form-control small" id="fName" name="fullName"
                 placeholder="name@example.com"
                 type="text">
          <label for="fName">Full Name</label>
        </div>

        <div class="form-floating mb-2">
          <input [(ngModel)]="authDetails.email" class="form-control small" id="email" name="email"
                 placeholder="name@example.com"
                 type="email">
          <label for="email">Email address</label>
        </div>

        <div class="form-floating mb-3">
          <input [(ngModel)]="authDetails.password" class="form-control small" id="password" name="password"
                 placeholder="Password"
                 type="password">
          <label for="password">Password</label>
        </div>
        <div class="text-center text-danger">
          {{ message }}
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">
          {{ isLogin ? 'Sign in' : 'Register' }}
        </button>
      </form>

      <div class="mt-3 ff-poppins fw-normal small">
        <span class="pe-1">{{ isLogin ? 'Didn\'t have an account please' : 'Already have an account' }}</span>
        <button (click)="isLogin=!isLogin" class="bg-transparent border-0 p-0 text-danger">
          {{ isLogin ? 'Register' : 'Login' }}
        </button>
      </div>
    </main>
  </div>
</div>
