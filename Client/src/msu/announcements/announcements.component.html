<div class="container-fluid p-3">


  <div class="container mt-3">
    <div class="h3 text-secondary mb-3">My Announcements</div>

    <p-table
      #dt1
      [globalFilterFields]="['title', 'content', 'createdBy.fullName']"
      [paginator]="true"
      [rowsPerPageOptions]="[10, 25, 50]"
      [rows]="10"
      [showCurrentPageReport]="false"
      [value]="announcements"
      dataKey="id"
    >
      <ng-template pTemplate="caption">
        <div class="d-flex justify-content-between">
              <span class="p-input-icon-left ml-auto">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input (input)="dt1.filterGlobal(getInput($event), 'contains')" pInputText placeholder="Search keyword"
                       type="text"/>
            </span>
          <button class="btn btn-sm btn-primary" (click)="onAddAnnouncement()">
            <i class="fa-solid fa-plus"></i>
            Add New Announcement
          </button>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th width="65%">
            <div class="flex align-items-center">
              Announcement
            </div>
          </th>
          <th>
            <div class="flex align-items-center">
              Faculty
              <p-columnFilter display="menu" field="createdBy.fullName"
                              matchMode="in" type="text">
              </p-columnFilter>
            </div>
          </th>
        </tr>
      </ng-template>
      <ng-template let-a pTemplate="body">
        <tr>
          <td class="ff-inter">
            <div class="h5 fs-7 fw-bold">{{a.title}}</div>
            <span class="fs-8">{{ a.description }}</span>
          </td>
          <td>
            <span class="fs-7 ff-inter">{{a.createdBy.fullName}}</span>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7">No Announcements found.</td>
        </tr>
      </ng-template>
    </p-table>
<!--    <div class="announcements d-flex align-items-center justify-content-center">-->
<!--      <div class="card p-3 w-100" *ngFor="let a of announcements" style="max-width: 600px">-->
<!--        <div class="h5">{{a.title}}</div>-->
<!--        <span class="small">{{a.description}}</span>-->
<!--      </div>-->
<!--    </div>-->

  </div>

  <!-- Modal -->
  <div class="modal fade" id="addModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">New Announcement</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form (ngSubmit)="addAnnouncement()">
            <div class="form-floating mb-3">
              <input [(ngModel)]="announcement.title" class="form-control" id="forumTitle" name="title" placeholder="Title"
                     type="text">
              <label for="forumTitle">Title</label>
            </div>
            <div class="form-floating mb-3">
            <textarea [(ngModel)]="announcement.description" class="form-control" id="forumContent" name="content"
                      placeholder="name@example.com" style="min-height: 150px"></textarea>
              <label for="forumContent">Content</label>
            </div>
            <div class="my-3 d-flex justify-content-end">
              <button class="btn btn-primary" type="submit">
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
