<div class="container-fluid">
  <div class="card p-2 m-2 rounded-3 w-75 mx-auto">
    <div class="user-profile p-3 d-flex flex-row justify-content-start align-items-center">
      <div class="user-image d-flex flex-column gap-1 position-relative">
        <img [src]="user.profileImage||'../../assets/teacher.png'" alt="faculty image"
             class="rounded-circle border border-primary border-1"
             height="120" width="120">
        <input (change)="onFileSelected($event)" class="form-control d-none" id="userImage" name="userImage"
               type="file">
        <button (click)="openFIleSelector()" *ngIf="edit"
                class="btn btn-sm position-absolute text-white"
                style="left: 45px;bottom: 4px;background: rgba(0,0,0,.5)">
          <i class="fa-solid fa-camera"></i>
        </button>
      </div>

      <div class="user-details ms-3 ff-inter">
        <div class="row">
          <div class="col-6">
            <b>Name:</b> {{user.fullName}}
          </div>
          <div class="col-6">
            <b>Email:</b> {{user.email}}
          </div>
          <div class="col-6">
            <b>Phone:</b> {{user.phoneNumber}}
          </div>
          <div class="col-6">
            <b>Department:</b> {{user.department}}
          </div>
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-end me-5 mb-2">
      <button (click)="edit = !edit" *ngIf="!edit" class="btn btn-sm btn-outline-dark">
        <i class="fa-solid fa-pen-to-square"></i> Edit
      </button>
      <button (click)="edit = !edit" *ngIf="edit" class="btn btn-sm btn-outline-dark">
        <i class="fa-solid fa-xmark"></i> Close
      </button>
    </div>

    <div *ngIf="edit" class="edit-profile">
      <hr>
      <form (ngSubmit)="updateInfo()" class="p-4">
        <div class="fs-5 ff-poppins fw-normal mb-3">
          Edit Profile
        </div>
        <div class="row">
          <div class="col-6">
            <div class="form-floating mb-3">
              <input [(ngModel)]="user.fullName" class="form-control" id="name" name="fullName"
                     placeholder="name@example.com" type="text">
              <label for="name">Full Name</label>
            </div>
          </div>
          <div class="col-6">
            <div class="form-floating mb-3">
              <input [(ngModel)]="user.email" class="form-control" id="email" name="email" placeholder="Password"
                     type="email">
              <label for="email">Email Address</label>
            </div>
          </div>
          <div class="col-6">
            <div class="form-floating mb-3">
              <input [(ngModel)]="user.phoneNumber" class="form-control" id="phone" name="phoneNumber"
                     placeholder="name@example.com" type="tel">
              <label for="phone">Phone Number</label>
            </div>
          </div>
          <div class="col-6">
            <div class="form-floating">
              <input [(ngModel)]="user.department" class="form-control" id="department" name="department"
                     placeholder="Password" type="text">
              <label for="department">Department</label>
            </div>
          </div>
          <div class="col-12 d-flex flex-row justify-content-end">
            <button class="btn btn-primary" type="submit">
              Save
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
